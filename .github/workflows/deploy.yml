name: Build and Deploy to EKS

on:
  push:
    branches:
      - dev
      - staging
      - main

env:
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}-eks-cluster
  ECR_REGISTRY: 760773573647.dkr.ecr.us-east-1.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        run: |
          docker build -t $ECR_REGISTRY/$ENVIRONMENT-frontend:${{ github.sha }} -f app/frontend/indexDockerfile.dockerfile .
          docker push $ECR_REGISTRY/$ENVIRONMENT-frontend:${{ github.sha }}

      - name: Build and push API image
        run: |
          docker build -t $ECR_REGISTRY/$ENVIRONMENT-api:${{ github.sha }} -f app/api/appDockerfile.dockerfile .
          docker push $ECR_REGISTRY/$ENVIRONMENT-api:${{ github.sha }}

      - name: Build and push worker image
        run: |
          docker build -t $ECR_REGISTRY/$ENVIRONMENT-worker:${{ github.sha }} -f app/worker/workerDockerfile.dockerfile .
          docker push $ECR_REGISTRY/$ENVIRONMENT-worker:${{ github.sha }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8/frontend-deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8/api-deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8/worker-deployment.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install AWS Load Balancer Controller
        run: |
          kubectl delete mutatingwebhookconfiguration aws-load-balancer-webhook --ignore-not-found
          kubectl delete validatingwebhookconfiguration aws-load-balancer-webhook --ignore-not-found
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=$EKS_CLUSTER_NAME \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set region=$AWS_REGION \
            --set vpcId=${{ secrets.VPC_ID }}

          kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=120s

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8/serviceaccount.yaml
          kubectl apply -f k8/lb-controller-serviceaccount.yaml
          kubectl apply -f k8/frontend-deployment.yaml
          kubectl apply -f k8/api-deployment.yaml
          kubectl apply -f k8/worker-deployment.yaml
          kubectl apply -f k8/ingress.yaml

          kubectl rollout status deployment/frontend
          kubectl rollout status deployment/api
          kubectl rollout status deployment/worker

