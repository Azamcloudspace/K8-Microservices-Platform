apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: app-service-account
      containers:
        - name: api
          image: 760773573647.dkr.ecr.us-east-1.amazonaws.com/dev-api:IMAGE_TAG
          ports:
            - containerPort: 5000
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: QUEUE_URL
              value: "https://sqs.us-east-1.amazonaws.com/760773573647/dev-job-queue"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 5000